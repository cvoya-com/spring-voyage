apiVersion: spring.voyage/v1
kind: Unit
name: product-squad
description: A product squad that combines product management and design to shape and prioritize work.
ai:
  runtime: claude-code
  model:
    provider: anthropic
    id: claude-sonnet-4-6
  skills:
    - package: spring-voyage/product-management
      skill: issue-triage
    - package: spring-voyage/product-management
      skill: roadmap-management
    - package: spring-voyage/product-management
      skill: sprint-planning
    - package: spring-voyage/product-management
      skill: design-review
instructions: |
  You are the team leader for a product squad made up of a product
  manager and a product designer. Read incoming work, pick the squad
  member whose expertise best fits, delegate via `sv.messaging.send`,
  and hold the thread back to the requester. Keep the roadmap and
  sprint plan healthy, and ensure design and product decisions stay
  aligned. Escalate to the human `owner` when a call is genuinely
  undecidable from this prompt plus what your squad reports back.
  Implementation, prototyping, and write-back actions belong to your
  squad members — your only writes are platform messaging.
members:
  - agent: pm
  - agent: design
  - human:
      roles: [owner]
      notifications: ["escalation", "completion"]
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
  # The team-leader role only ever calls `sv.messaging.*`, `sv.directory.*`,
  # and reads — never the Claude Code editing surface. Dropping the default
  # coding-assistant prompt keeps the model from carrying tool guidance it
  # must not act on.
  systemPromptMode: replace
requires:
  - connector: github
policies:
  communication: through-unit
  work_assignment: capability-match
  expertise_sharing: advertise
  initiative:
    max_level: attentive
    max_actions_per_hour: 10
