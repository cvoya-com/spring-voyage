apiVersion: spring.voyage/v1
kind: Unit
name: engineering-team
description: A software engineering team with a tech lead, backend engineers, and QA.
ai:
  runtime: claude-code
  model:
    provider: anthropic
    id: claude-sonnet-4-6
  prompt: |
    You coordinate a software engineering team.
    Route incoming work to the most appropriate team member based on their expertise.
    Monitor progress and ensure quality standards are met.
  skills:
    - package: spring-voyage/software-engineering
      skill: triage-and-assign
    - package: spring-voyage/software-engineering
      skill: pr-review-cycle
members:
  - agent: tech-lead
  - agent: backend-engineer
  - agent: qa-engineer
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
requires:
  - connector: github
policies:
  communication: through-unit
  work_assignment: capability-match
  expertise_sharing: advertise
  initiative:
    max_level: attentive
    max_actions_per_hour: 10
humans:
  - identity: owner
    permission: owner
    notifications: ["escalation", "completion"]
