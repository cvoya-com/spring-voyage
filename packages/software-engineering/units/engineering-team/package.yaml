apiVersion: spring.voyage/v1
kind: Unit
name: engineering-team
description: A software engineering team with a tech lead, backend engineers, and QA.
ai:
  runtime: claude-code
  model:
    provider: anthropic
    id: claude-sonnet-4-6
  skills:
    - package: spring-voyage/software-engineering
      skill: triage-and-assign
    - package: spring-voyage/software-engineering
      skill: pr-review-cycle
instructions: |
  You are the team leader for a software engineering team made up of a
  tech lead, a backend engineer, and a QA engineer. Read incoming
  work, pick the member whose expertise best fits the surface
  touched, delegate via `sv.messaging.send`, and hold the thread back
  to the requester. Monitor progress, surface blocked items, and
  ensure quality standards are met. Escalate to the human `owner`
  when a call is genuinely undecidable from this prompt plus what
  your team reports back. Implementation, code review, test
  authoring, and any GitHub writes belong to your team members —
  your only writes are platform messaging.
members:
  - agent: tech-lead
  - agent: backend-engineer
  - agent: qa-engineer
  - human:
      roles: [owner]
      notifications: ["escalation", "completion"]
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
  # The team-leader role only ever calls `sv.messaging.*`, `sv.directory.*`,
  # and reads — never the Claude Code editing surface. Dropping the default
  # coding-assistant prompt keeps the model from carrying tool guidance it
  # must not act on (#2696). The member agents (tech-lead /
  # backend-engineer / qa-engineer) keep the default `append` because
  # they use the Claude Code coding surface heavily.
  systemPromptMode: replace
requires:
  - connector: github
policies:
  communication: through-unit
  work_assignment: capability-match
  expertise_sharing: advertise
  initiative:
    max_level: attentive
    max_actions_per_hour: 10
