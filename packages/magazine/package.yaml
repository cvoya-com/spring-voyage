apiVersion: spring.voyage/v1
kind: Package
name: magazine
displayName: Magazine
description: >-
  Magazine — a goal-driven editorial team that produces a daily online
  edition. A user opens a conversation with the Magazine Director — the
  magazine's editor-in-chief — to kick off an edition. The editor plans
  it, coordinates the team through pitching, reporting, fact-check,
  copy-edit, packaging, and assembly, and presents the finished edition
  to a human approver for sign-off before publication.
