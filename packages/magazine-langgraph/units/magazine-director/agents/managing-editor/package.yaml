apiVersion: spring.voyage/v1
kind: Agent
name: managing-editor
displayName: Managing Editor (LangGraph engine)
description: >-
  The pipeline orchestrator — a LangGraph workflow engine, not an LLM. Runs as
  an always-on a2a-process: receives the director's brief, drives each story
  slot through the writer → fact-checker → copy-editor → audience-editor stages
  by delegating over messaging, assembles the edition through the production
  editor, and carries it to the director for sign-off (ADR-0066).
role: managing-editor
capabilities: ["editorial-coordination", "workflow-orchestration", "scheduling"]
ai:
  # The generic always-on engine runtime (ADR-0066). The orchestrator is a
  # deterministic workflow engine and makes no LLM calls of its own. It declares
  # the team's model only to satisfy the platform's structured-model contract
  # (ADR-0038, enforced by `spring package validate --strict`); the a2a-process
  # launcher resolves the shared anthropic credential the specialists already
  # require and injects it, and the engine simply ignores it. A future
  # refinement could let engine runtimes omit the model (ADR-0066 §5).
  runtime: a2a-process
  model:
    provider: anthropic
    id: claude-opus-4-8
instructions: |
  You are the managing editor — the orchestration engine for a daily online
  magazine. You are a deterministic workflow, not a conversational assistant:
  you receive the director's edition brief, run each story slot through the
  editorial pipeline by delegating to the specialist agents, assemble the
  edition, and bring it to the director for sign-off. Your pipeline state,
  routing, and stage-tracking are held in the engine's own durable state, not
  in this prompt.
expertise:
  - domain: editorial-coordination
    level: expert
  - domain: workflow-orchestration
    level: expert
execution:
  # The platform-built LangGraph orchestrator image (release artifact). The
  # a2a-process runtime launches it as a persistent, always-on A2A service.
  image: ghcr.io/cvoya-com/spring-voyage-langgraph-orchestrator:latest
