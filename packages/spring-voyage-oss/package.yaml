apiVersion: spring.voyage/v1
kind: Package
name: spring-voyage-oss
description: The Spring Voyage OSS dogfooding organisation — software engineering, design, product management, and program management operating on the Spring Voyage platform itself.
version: 1.0.0
readme: README.md

# ADR-0037 decision 2: per-artefact YAMLs declare their own `requires:` blocks.
# Each member unit that needs the GitHub connector binds it via
# `requires: [{ connector: github }]`; the package's effective requirement set
# is the union, computed at install time. Operators configure the GitHub
# binding once via the wizard's connector step or `spring package install
# --connector github=<owner>/<repo>@<installation-id>`.
#
# ADR-0043 §2: directory layout is the manifest — no `content:` block. The
# package ships exactly the artefacts discovered under `units/` and
# `agents/`. Sub-units (sv-oss-software-engineering / -design /
# -product-management / -program-management) are members of the umbrella
# unit, declared in its own `members:` list.

# Package-level execution defaults (#1679). The umbrella's container image
# becomes the package default — sub-units that don't ship their own
# image inherit it; sub-units that DO declare execution.image (the four
# OSS team images) override field-wise. `inherit:` is omitted, so every
# member participates by default.
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
