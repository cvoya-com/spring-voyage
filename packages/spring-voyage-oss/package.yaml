apiVersion: spring.voyage/v1
metadata:
  name: spring-voyage-oss
  description: The Spring Voyage OSS dogfooding organisation — software engineering, design, product management, and program management operating on the Spring Voyage platform itself.

# #1670: declarative connector dependency. Operators configure the GitHub
# binding once at install time (via the wizard's forced connector step or
# `spring package install --connector github=<owner>/<repo>@<installation-id>`);
# every member unit inherits the binding by default.
connectors:
  - type: github
    required: true

# #1718 item 2: top-level artefacts only. Sub-units (sv-oss-software-
# engineering / -design / -product-management / -program-management) are
# discovered automatically from the umbrella unit's `members:` list — the
# old `subUnits:` enumeration was redundant and is gone.
content:
  - unit: spring-voyage-oss
