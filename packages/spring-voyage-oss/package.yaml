apiVersion: spring.voyage/v1
kind: Package
name: spring-voyage-oss
displayName: Spring Voyage OSS
description: The Spring Voyage OSS dogfooding organisation — software engineering and program management operating on the Spring Voyage platform itself.
version: 1.0.0
readme: README.md

# ADR-0037 decision 2: per-artefact YAMLs declare their own `requires:` blocks.
# Each member unit that needs the GitHub connector binds it via
# `requires: [{ connector: github }]`; the package's effective requirement set
# is the union, computed at install time. Operators configure the GitHub
# binding once via the wizard's connector step (auth-choice sub-step) or
# `spring connector bind --connector github --repo <owner>/<repo>
# --installation-id <id>` (App-installation auth, default) / `... --pat-secret-name
# <name>` (PAT auth alternative, per ADR-0047 §11).
#
# ADR-0043 §1 / §3: directory layout is the manifest — no `content:` block.
# The package ships exactly the artefacts discovered under `units/`. The
# `spring-voyage-oss` unit is the package's single top-level activatable;
# its engineer and PM agent members are stamped inline from the package's
# `software-engineer` and `program-manager` templates per §5g.

# Package-level execution defaults (#1679). The router image becomes the
# package default — the umbrella unit (which does not pin its own image)
# inherits it. Agent members stamped from the templates use the templates'
# team-specific images (software-engineer / program-manager). `inherit:`
# is omitted, so every member participates by default.
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
