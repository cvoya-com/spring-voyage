apiVersion: spring.voyage/v1
kind: Package
name: spring-voyage-oss
description: The Spring Voyage OSS dogfooding organisation — software engineering and program management operating on the Spring Voyage platform itself.
version: 1.0.0
readme: README.md

# ADR-0037 decision 2: per-artefact YAMLs declare their own `requires:` blocks.
# Each member unit that needs the GitHub connector binds it via
# `requires: [{ connector: github }]`; the package's effective requirement set
# is the union, computed at install time. Operators configure the GitHub
# binding once via the wizard's connector step or `spring package install
# --connector github=<owner>/<repo>@<installation-id>`.
#
# ADR-0043 §1 / §3: directory layout is the manifest — no `content:` block.
# The package ships exactly the artefacts discovered under `units/`. The
# umbrella `spring-voyage-oss` is the package's single top-level unit;
# its two sub-units (`sv-oss-software-engineering`, `sv-oss-program-management`)
# nest under the umbrella's own `units/` subdirectory per ADR-0043 §1's
# recursive-containment rule. The membership graph (the umbrella's
# `members:` block) and the filesystem layout agree.

# Package-level execution defaults (#1679). The umbrella's container image
# becomes the package default — the umbrella unit (which does not pin its
# own image) inherits it; the two sub-units declare their own
# `execution.image` and override field-wise. `inherit:` is omitted, so
# every member participates by default.
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
