apiVersion: spring.voyage/v1
kind: Package
name: engineer-defaults
displayName: Engineer Defaults
description: Engineer-shaped defaults — shell-tooling guardrails for agents whose runtime is command-line heavy, on top of the platform's universal guardrails.
version: 1.0.0
readme: README.md

# The `sv.engineer.defaults` skill bundle. The platform's universal
# guardrails cover what every agent must respect when threads share a
# process; this bundle adds the shell-tooling footguns that only matter for
# command-line-heavy engineer agents — long-running watcher commands
# (`npm run dev`, `dotnet watch run`, …) and broad process kills (`pkill`,
# `killall`). They live here so engineer agents that equip this bundle get
# the guidance and other agent classes aren't shown tool names they have no
# model for.
#
# This package declares NO `requires:` block: the bundle ships prose-only
# guidance and grants no tools beyond the platform core (`.tools.json` is an
# empty array). The directory layout is the manifest — no `content:` block.
