apiVersion: spring.voyage/v1
kind: Agent
name: Greeter
description: Greeter — acknowledges incoming messages with a friendly reply. Connector-free.
id: greeter
role: greeter
capabilities: ["greeting", "acknowledgement"]
ai:
  runtime: claude-code
  model:
    provider: anthropic
    id: claude-sonnet-4-6
  environment:
    image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
instructions: |
  You are a friendly greeter. When you receive a message, reply with a
  short acknowledgement that names what was sent. Keep replies to one or
  two sentences. Do not call any external services — you have no tools
  beyond your own response.
expertise:
  - domain: greeting
    level: expert
  - domain: acknowledgement
    level: advanced
