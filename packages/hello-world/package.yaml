apiVersion: spring.voyage/v1
kind: Package
name: hello-world
displayName: Hello World
description: The minimal package — one unit, one agent, no connector, no skills. The smallest install-and-activate example.
version: 1.0.0
readme: README.md

# This package intentionally declares NO `requires:` block on either the
# unit or the agent, so `spring package install hello-world` runs end-to-end
# without a connector binding — the smallest possible install.
#
# The directory layout is the manifest — no `content:` block. The package
# ships exactly the artefacts discovered under `units/` and `agents/`.
