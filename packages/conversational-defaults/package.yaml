apiVersion: spring.voyage/v1
kind: Package
name: conversational-defaults
displayName: Conversational Defaults
description: Default tool grants for conversational agents — the bundle every agent inherits.
version: 1.0.0
readme: README.md

# The `sv.conversational.defaults` skill bundle — the default bundle every
# agent inherits. It ships exactly one skill (`conversational-defaults`)
# that grants the fundamental-core tools for a conversational agent. The
# skill is referenced as `spring-voyage/conversational-defaults` from the
# default agent wiring.
#
# This package declares NO `requires:` block: every tool the bundle names is
# a platform `sv.*` tool, implicitly granted to every subject. The
# `.tools.json` declares those tools so the strict skill-bundle validator
# can confirm each namespace is registered at install time. The directory
# layout is the manifest — no `content:` block.
