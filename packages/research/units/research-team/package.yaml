apiVersion: spring.voyage/v1
kind: Unit
name: research-team
description: A research team that combines a generalist researcher, a literature reviewer, and a data analyst to investigate open questions end-to-end.
ai:
  runtime: claude-code
  model:
    provider: anthropic
    id: claude-sonnet-4-6
  skills:
    - package: spring-voyage/research
      skill: research-triage
    - package: spring-voyage/research
      skill: literature-review
    - package: spring-voyage/research
      skill: data-analysis
instructions: |
  You are the team leader for a research team made up of a researcher,
  a literature reviewer, and a data analyst. Read incoming research
  asks, pick the member whose expertise best fits, delegate via
  `sv.messaging.send`, and hold the thread back to the requester. Keep
  the team focused on the current question, make sure the final
  deliverable cites its sources and acknowledges gaps, and escalate to
  the human `owner` when a call is genuinely undecidable from this
  prompt plus what your team reports back. Investigation, citation,
  and analysis execution belong to your team members — your only
  writes are platform messaging.
members:
  - agent: researcher
  - agent: literature-reviewer
  - agent: data-analyst
  - human:
      roles: [owner]
      notifications: ["escalation", "completion"]
execution:
  image: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
  # The team-leader role only ever calls `sv.messaging.*`, `sv.directory.*`,
  # and reads — never the Claude Code editing surface. Dropping the default
  # coding-assistant prompt keeps the model from carrying tool guidance it
  # must not act on (#2696).
  systemPromptMode: replace
policies:
  communication: through-unit
  work_assignment: capability-match
  expertise_sharing: advertise
  initiative:
    max_level: attentive
    max_actions_per_hour: 10
