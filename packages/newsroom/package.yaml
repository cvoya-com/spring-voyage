apiVersion: spring.voyage/v1
kind: Package
name: newsroom
description: >-
  Newsroom — a communication-shaped example: a desk of beat reporters who own
  their beats and keep each other informed with sv.messaging.send /
  sv.messaging.broadcast. The exact inverse of the delegation-shaped
  spring-voyage-oss package, whose unit's job is to route inbound work down to
  members; here nobody delegates — work is owned, not routed.
version: 1.0.0
readme: README.md
# ADR-0043 §2: directory layout is the manifest — no `content:` block.
