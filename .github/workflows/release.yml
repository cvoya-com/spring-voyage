name: Release

# Fires when a v*.*.*[-prerelease] tag is pushed to the repository.
# Jobs:
#   1. resolve          — validate the tag shape and emit version components.
#   2. ci-gate          — verify the tagged commit's CI run on main was green
#                         (Checks API lookup against the resolved SHA).
#   3. publish-images   — build and push all agent container images to GHCR.
#   4. github-release   — create the GitHub Release from CHANGELOG.md.
#
# Why ci-gate instead of re-running build/test (#2027): tags must point at a
# commit that is already on main, and main is gated by ci.yml's "Required
# checks" umbrella. Re-running the full .NET build + test suite on the
# tagged commit duplicates ~10 minutes of work that branch protection has
# already validated. Instead we look up the umbrella check's conclusion on
# the tag SHA and refuse to release if it isn't `success`.
#
# NuGet packaging is explicitly out of scope until the publishing target is
# decided; see issue #1395.
#
# Untrusted inputs (github.ref_name, inputs.tag) are routed through env vars
# in their consuming steps and validated by regex in the resolve job before any
# downstream step touches them. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      # Matches v0.1.0, v1.2.3-rc.1, v0.2.0-alpha.3, etc.
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # Create GitHub Releases and upload assets.
  packages: write   # Push to ghcr.io.
  id-token: write   # OIDC token for attestation (future-proofing).

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  CLAUDE_CODE_IMAGE: ghcr.io/cvoya-com/claude-code-base
  SPRING_VOYAGE_AGENT_IMAGE: ghcr.io/cvoya-com/spring-voyage-agent

jobs:
  # ── 1. Resolve ─────────────────────────────────────────────────────────────
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      major_minor: ${{ steps.r.outputs.major_minor }}
      is_prerelease: ${{ steps.r.outputs.is_prerelease }}
    steps:
      - name: Resolve release tag and version components
        id: r
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "::error::could not resolve a release tag"
            exit 1
          fi

          # Validate: must be v<semver> with optional prerelease suffix.
          if ! [[ "$release_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::tag '$release_tag' does not match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          prerelease_suffix="${BASH_REMATCH[4]:-}"

          # e.g. "0.1.0" (no leading v, with prerelease suffix if present)
          release_version="${major}.${minor}.${patch}${prerelease_suffix}"
          # e.g. "0.1"
          major_minor="${major}.${minor}"
          # Prerelease if the tag has a suffix like -rc.1 or -alpha.2
          is_prerelease="false"
          if [[ -n "$prerelease_suffix" ]]; then
            is_prerelease="true"
          fi

          {
            echo "tag=$release_tag"
            echo "version=$release_version"
            echo "major_minor=$major_minor"
            echo "is_prerelease=$is_prerelease"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved: tag=$release_tag version=$release_version major_minor=$major_minor is_prerelease=$is_prerelease"

  # ── 2. CI gate ─────────────────────────────────────────────────────────────
  #
  # Verifies that ci.yml's "Required checks" umbrella check ran and concluded
  # `success` against the tagged commit's SHA. Tags must already be on main
  # and main is branch-protected on that umbrella, so this is a belt-and-
  # braces check that the operator did not bypass branch protection (e.g. by
  # tagging a commit that landed via an admin override).
  #
  # Replaces the previous full .NET build + test re-run (~10 min) with a
  # GitHub API lookup that completes in seconds (#2027). If branch protection
  # ever drops the umbrella requirement, this gate is the second line of
  # defence — keep it.
  ci-gate:
    name: CI gate (verify tag SHA passed CI)
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      REPO: ${{ github.repository }}
      # Name of the umbrella check defined in ci.yml's `required-checks` job
      # (`name:` field, line ~1285). If you rename that job, update this
      # value or the gate will report "no matching check-run found".
      REQUIRED_CHECK_NAME: Required checks

    steps:
      - name: Resolve tag to commit SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # `gh api` resolves the annotated/lightweight tag to its commit SHA.
          # For lightweight tags `object.sha` is the commit; for annotated
          # tags we follow object.type=='tag' through to the underlying
          # commit one extra hop.
          tag_obj="$(gh api "repos/${REPO}/git/refs/tags/${RELEASE_TAG}")"
          obj_type="$(jq -r '.object.type' <<<"$tag_obj")"
          obj_sha="$(jq -r '.object.sha'  <<<"$tag_obj")"

          if [[ "$obj_type" == "tag" ]]; then
            commit_sha="$(gh api "repos/${REPO}/git/tags/${obj_sha}" | jq -r '.object.sha')"
          else
            commit_sha="$obj_sha"
          fi

          if ! [[ "$commit_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::could not resolve commit SHA for tag '${RELEASE_TAG}'"
            exit 1
          fi

          echo "commit=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved tag ${RELEASE_TAG} -> ${commit_sha}"

      - name: Verify Required checks umbrella was green for tag SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ steps.sha.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail

          # Poll for up to ~10 minutes (60 attempts × 10 s) so a tag pushed
          # immediately after the merge to main can wait for CI to wrap up
          # without failing the release. Once the umbrella check-run reaches
          # a terminal status we evaluate and exit; we never sleep past
          # completion.
          attempt=0
          max_attempts=60
          conclusion=""
          status=""

          while (( attempt < max_attempts )); do
            attempt=$(( attempt + 1 ))

            # /commits/{sha}/check-runs returns up to 100 check-runs by
            # default; we filter by name client-side. `--paginate` would
            # walk further if the repo ever exceeds that, but the umbrella
            # is a single run per workflow execution so the first page is
            # always sufficient.
            payload="$(gh api \
              "repos/${REPO}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
              -H "Accept: application/vnd.github+json")"

            # Pick the most recent check-run with the configured name.
            # `started_at` is ISO-8601 so lexicographic sort is correct.
            match="$(jq --arg name "$REQUIRED_CHECK_NAME" '
              [.check_runs[] | select(.name == $name)]
              | sort_by(.started_at)
              | last
            ' <<<"$payload")"

            if [[ "$match" == "null" || -z "$match" ]]; then
              echo "attempt ${attempt}: no '${REQUIRED_CHECK_NAME}' check-run found yet for ${COMMIT_SHA}; sleeping 10s"
              sleep 10
              continue
            fi

            status="$(jq -r '.status'     <<<"$match")"
            conclusion="$(jq -r '.conclusion' <<<"$match")"

            if [[ "$status" == "completed" ]]; then
              echo "attempt ${attempt}: '${REQUIRED_CHECK_NAME}' completed with conclusion=${conclusion}"
              break
            fi

            echo "attempt ${attempt}: '${REQUIRED_CHECK_NAME}' status=${status}; sleeping 10s"
            sleep 10
          done

          if [[ "$status" != "completed" ]]; then
            echo "::error::'${REQUIRED_CHECK_NAME}' did not reach a terminal status within the polling window for ${COMMIT_SHA} (last status=${status})"
            exit 1
          fi

          if [[ "$conclusion" != "success" ]]; then
            echo "::error::'${REQUIRED_CHECK_NAME}' on ${COMMIT_SHA} concluded '${conclusion}', not 'success' — refusing to release"
            exit 1
          fi

          echo "CI gate passed: ${REQUIRED_CHECK_NAME} == success on ${COMMIT_SHA}"

  # ── 3. Publish container images ────────────────────────────────────────────
  #
  # Builds the three agent images via devops/build/build-agent-images.sh and
  # pushes them to ghcr.io/cvoya/* under the versioned and floating tags
  # defined in docs/developer/releases.md.
  #
  # Image tagging scheme (stable releases only — pre-releases get the immutable
  # version tag and do NOT move :latest or :X.Y):
  #   :X.Y.Z      — immutable, never reused
  #   :X.Y        — floating, updated on each new patch of the X.Y minor line
  #   :latest     — floating, updated on each stable release
  publish-images:
    name: Build and push agent images
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate]
    timeout-minutes: 30
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
      IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify docker is on PATH
        shell: bash
        run: docker version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all agent images
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          bash devops/build/build-agent-images.sh --tag "${RELEASE_VERSION}" --ghcr-only

      # The build script tags:
      #   ghcr.io/cvoya-com/spring-voyage-agent-base:<tag> (re-tagged below)
      #   ghcr.io/cvoya-com/claude-code-base:<tag>          (ready to push)
      #   ghcr.io/cvoya-com/spring-voyage-agent:<tag>       (ready to push)
      - name: Tag and push claude-code-base
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          TARGET_BASE: ${{ env.CLAUDE_CODE_IMAGE }}
        run: |
          set -euo pipefail
          # Immutable version tag — always pushed, stable and pre-release alike.
          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          else
            echo "Pre-release: skipping :${MAJOR_MINOR} and :latest tags for claude-code-base"
          fi

      - name: Tag and push agent-base
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          TARGET_BASE="ghcr.io/cvoya-com/agent-base"

          # build-agent-images.sh tags the image as spring-voyage-agent-base locally.
          docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
            "${TARGET_BASE}:${RELEASE_VERSION}"
          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          fi

      - name: Tag and push spring-voyage-agent (native A2A runtime)
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          TARGET_BASE: ${{ env.SPRING_VOYAGE_AGENT_IMAGE }}
        run: |
          set -euo pipefail

          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          fi

      - name: Make GHCR packages public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for package in claude-code-base agent-base spring-voyage-agent; do
            gh api -X PATCH "/orgs/cvoya-com/packages/container/${package}" \
              -F visibility=public
          done

      - name: Image publish summary
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
        run: |
          {
            echo "### Agent images published"
            echo
            echo "| Image | Tags |"
            echo "| --- | --- |"
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "| \`ghcr.io/cvoya-com/claude-code-base\` | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`   | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\` | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
            else
              echo "| \`ghcr.io/cvoya-com/claude-code-base\` | \`${RELEASE_VERSION}\` (pre-release — :latest and :${MAJOR_MINOR} not updated) |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`   | \`${RELEASE_VERSION}\` (pre-release) |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\` | \`${RELEASE_VERSION}\` (pre-release) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 4. GitHub Release ──────────────────────────────────────────────────────
  #
  # Creates the GitHub Release using the ## [Unreleased] section of
  # CHANGELOG.md as the release notes. The maintainer's pre-release PR
  # moves the [Unreleased] entries to the new version heading before tagging;
  # this job reads whatever is in [Unreleased] at the tagged commit.
  #
  # Uses `gh` directly (GITHUB_TOKEN) rather than softprops/action-gh-release
  # so there is no external action dependency beyond the already-used actions/*.
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate, publish-images]
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          notes="$(bash scripts/extract-changelog-section.sh "Unreleased")"
          if [[ -z "$notes" ]]; then
            echo "::warning::## [Unreleased] section in CHANGELOG.md is empty — release notes will be empty."
          fi
          # Write to a temp file so multiline content survives the GITHUB_OUTPUT
          # 256 KB limit and avoids any quoting pitfalls.
          echo "$notes" > /tmp/release-notes.md

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          # shellcheck disable=SC2086  # prerelease_flag intentionally unquoted
          gh release create "${RELEASE_TAG}" \
            --title "v${RELEASE_VERSION}" \
            --notes-file /tmp/release-notes.md \
            --repo "${REPO}" \
            ${prerelease_flag}

          echo "GitHub Release created: https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
