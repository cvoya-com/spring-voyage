name: Release

# Fires when a v*.*.*[-prerelease] tag is pushed to the repository.
# Jobs:
#   1. resolve                 — validate the tag shape and emit version components.
#   2. ci-gate                 — verify the tagged commit's CI run on main was green
#                                (Checks API lookup against the resolved SHA).
#   3. publish-images          — build and push all agent container images to GHCR.
#   4. publish-platform-image  — build and push the platform image to GHCR (#2172).
#   5. publish-spring-cli      — publish self-contained `spring` CLI binaries (#2172).
#   6. publish-dispatcher      — publish self-contained dispatcher binaries (#2172;
#                                absorbed from the deprecated release-spring-dispatcher.yml).
#   7. publish-bundle          — assemble the operator deployment bundle and
#                                SHA256SUMS over all release assets (#2172).
#   8. github-release          — create the GitHub Release from CHANGELOG.md.
#
# Why ci-gate instead of re-running build/test (#2027): tags must point at a
# commit that is already on main, and main is gated by ci.yml's "Required
# checks" umbrella. Re-running the full .NET build + test suite on the
# tagged commit duplicates ~10 minutes of work that branch protection has
# already validated. Instead we look up the umbrella check's conclusion on
# the tag SHA and refuse to release if it isn't `success`.
#
# NuGet packaging is explicitly out of scope until the publishing target is
# decided; see issue #1395.
#
# Untrusted inputs (github.ref_name, inputs.tag) are routed through env vars
# in their consuming steps and validated by regex in the resolve job before any
# downstream step touches them. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      # Matches v0.1.0, v1.2.3-rc.1, v0.2.0-alpha.3, etc.
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # Create GitHub Releases and upload assets.
  packages: write   # Push to ghcr.io.
  id-token: write   # OIDC token for attestation (future-proofing).

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  CLAUDE_CODE_IMAGE: ghcr.io/cvoya-com/claude-code-base
  SPRING_VOYAGE_AGENT_IMAGE: ghcr.io/cvoya-com/spring-voyage-agent
  # #2172: platform image consumed by deploy.sh via SPRING_PLATFORM_IMAGE.
  SPRING_VOYAGE_PLATFORM_IMAGE: ghcr.io/cvoya-com/spring-voyage

jobs:
  # ── 1. Resolve ─────────────────────────────────────────────────────────────
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      major_minor: ${{ steps.r.outputs.major_minor }}
      is_prerelease: ${{ steps.r.outputs.is_prerelease }}
    steps:
      - name: Resolve release tag and version components
        id: r
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "::error::could not resolve a release tag"
            exit 1
          fi

          # Validate: must be v<semver> with optional prerelease suffix.
          if ! [[ "$release_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::tag '$release_tag' does not match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          prerelease_suffix="${BASH_REMATCH[4]:-}"

          # e.g. "0.1.0" (no leading v, with prerelease suffix if present)
          release_version="${major}.${minor}.${patch}${prerelease_suffix}"
          # e.g. "0.1"
          major_minor="${major}.${minor}"
          # Prerelease if the tag has a suffix like -rc.1 or -alpha.2
          is_prerelease="false"
          if [[ -n "$prerelease_suffix" ]]; then
            is_prerelease="true"
          fi

          {
            echo "tag=$release_tag"
            echo "version=$release_version"
            echo "major_minor=$major_minor"
            echo "is_prerelease=$is_prerelease"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved: tag=$release_tag version=$release_version major_minor=$major_minor is_prerelease=$is_prerelease"

  # ── 2. CI gate ─────────────────────────────────────────────────────────────
  #
  # Verifies that ci.yml's "Required checks" umbrella check ran and concluded
  # `success` against the tagged commit's SHA. Tags must already be on main
  # and main is branch-protected on that umbrella, so this is a belt-and-
  # braces check that the operator did not bypass branch protection (e.g. by
  # tagging a commit that landed via an admin override).
  #
  # Replaces the previous full .NET build + test re-run (~10 min) with a
  # GitHub API lookup that completes in seconds (#2027). If branch protection
  # ever drops the umbrella requirement, this gate is the second line of
  # defence — keep it.
  ci-gate:
    name: CI gate (verify tag SHA passed CI)
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      REPO: ${{ github.repository }}
      # Name of the umbrella check defined in ci.yml's `required-checks` job
      # (`name:` field, line ~1285). If you rename that job, update this
      # value or the gate will report "no matching check-run found".
      REQUIRED_CHECK_NAME: Required checks

    steps:
      - name: Resolve tag to commit SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # `gh api` resolves the annotated/lightweight tag to its commit SHA.
          # For lightweight tags `object.sha` is the commit; for annotated
          # tags we follow object.type=='tag' through to the underlying
          # commit one extra hop.
          tag_obj="$(gh api "repos/${REPO}/git/refs/tags/${RELEASE_TAG}")"
          obj_type="$(jq -r '.object.type' <<<"$tag_obj")"
          obj_sha="$(jq -r '.object.sha'  <<<"$tag_obj")"

          if [[ "$obj_type" == "tag" ]]; then
            commit_sha="$(gh api "repos/${REPO}/git/tags/${obj_sha}" | jq -r '.object.sha')"
          else
            commit_sha="$obj_sha"
          fi

          if ! [[ "$commit_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::could not resolve commit SHA for tag '${RELEASE_TAG}'"
            exit 1
          fi

          echo "commit=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved tag ${RELEASE_TAG} -> ${commit_sha}"

      - name: Verify Required checks umbrella was green for tag SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ steps.sha.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail

          # Poll for up to ~10 minutes (60 attempts × 10 s) so a tag pushed
          # immediately after the merge to main can wait for CI to wrap up
          # without failing the release. Once the umbrella check-run reaches
          # a terminal status we evaluate and exit; we never sleep past
          # completion.
          attempt=0
          max_attempts=60
          conclusion=""
          status=""

          while (( attempt < max_attempts )); do
            attempt=$(( attempt + 1 ))

            # /commits/{sha}/check-runs returns up to 100 check-runs by
            # default; we filter by name client-side. `--paginate` would
            # walk further if the repo ever exceeds that, but the umbrella
            # is a single run per workflow execution so the first page is
            # always sufficient.
            payload="$(gh api \
              "repos/${REPO}/commits/${COMMIT_SHA}/check-runs?per_page=100" \
              -H "Accept: application/vnd.github+json")"

            # Pick the most recent check-run with the configured name.
            # `started_at` is ISO-8601 so lexicographic sort is correct.
            match="$(jq --arg name "$REQUIRED_CHECK_NAME" '
              [.check_runs[] | select(.name == $name)]
              | sort_by(.started_at)
              | last
            ' <<<"$payload")"

            if [[ "$match" == "null" || -z "$match" ]]; then
              echo "attempt ${attempt}: no '${REQUIRED_CHECK_NAME}' check-run found yet for ${COMMIT_SHA}; sleeping 10s"
              sleep 10
              continue
            fi

            status="$(jq -r '.status'     <<<"$match")"
            conclusion="$(jq -r '.conclusion' <<<"$match")"

            if [[ "$status" == "completed" ]]; then
              echo "attempt ${attempt}: '${REQUIRED_CHECK_NAME}' completed with conclusion=${conclusion}"
              break
            fi

            echo "attempt ${attempt}: '${REQUIRED_CHECK_NAME}' status=${status}; sleeping 10s"
            sleep 10
          done

          if [[ "$status" != "completed" ]]; then
            echo "::error::'${REQUIRED_CHECK_NAME}' did not reach a terminal status within the polling window for ${COMMIT_SHA} (last status=${status})"
            exit 1
          fi

          if [[ "$conclusion" != "success" ]]; then
            echo "::error::'${REQUIRED_CHECK_NAME}' on ${COMMIT_SHA} concluded '${conclusion}', not 'success' — refusing to release"
            exit 1
          fi

          echo "CI gate passed: ${REQUIRED_CHECK_NAME} == success on ${COMMIT_SHA}"

  # ── 3. Publish container images ────────────────────────────────────────────
  #
  # Builds the three agent images via devops/build/build-agent-images.sh and
  # pushes them to ghcr.io/cvoya/* under the versioned and floating tags
  # defined in docs/developer/releases.md.
  #
  # Image tagging scheme (stable releases only — pre-releases get the immutable
  # version tag and do NOT move :latest or :X.Y):
  #   :X.Y.Z      — immutable, never reused
  #   :X.Y        — floating, updated on each new patch of the X.Y minor line
  #   :latest     — floating, updated on each stable release
  publish-images:
    name: Build and push agent images
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate]
    timeout-minutes: 30
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
      IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify docker is on PATH
        shell: bash
        run: docker version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all agent images
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          bash devops/build/build-agent-images.sh --tag "${RELEASE_VERSION}" --ghcr-only

      # The build script tags:
      #   ghcr.io/cvoya-com/spring-voyage-agent-base:<tag> (re-tagged below)
      #   ghcr.io/cvoya-com/claude-code-base:<tag>          (ready to push)
      #   ghcr.io/cvoya-com/spring-voyage-agent:<tag>       (ready to push)
      - name: Tag and push claude-code-base
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          TARGET_BASE: ${{ env.CLAUDE_CODE_IMAGE }}
        run: |
          set -euo pipefail
          # Immutable version tag — always pushed, stable and pre-release alike.
          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          else
            echo "Pre-release: skipping :${MAJOR_MINOR} and :latest tags for claude-code-base"
          fi

      - name: Tag and push agent-base
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          TARGET_BASE="ghcr.io/cvoya-com/agent-base"

          # build-agent-images.sh tags the image as spring-voyage-agent-base locally.
          docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
            "${TARGET_BASE}:${RELEASE_VERSION}"
          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "ghcr.io/cvoya-com/spring-voyage-agent-base:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          fi

      - name: Tag and push spring-voyage-agent (native A2A runtime)
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          TARGET_BASE: ${{ env.SPRING_VOYAGE_AGENT_IMAGE }}
        run: |
          set -euo pipefail

          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          fi

      - name: Make GHCR packages public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for package in claude-code-base agent-base spring-voyage-agent; do
            gh api -X PATCH "/orgs/cvoya-com/packages/container/${package}" \
              -F visibility=public
          done

      - name: Image publish summary
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
        run: |
          {
            echo "### Agent images published"
            echo
            echo "| Image | Tags |"
            echo "| --- | --- |"
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "| \`ghcr.io/cvoya-com/claude-code-base\` | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`   | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\` | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
            else
              echo "| \`ghcr.io/cvoya-com/claude-code-base\` | \`${RELEASE_VERSION}\` (pre-release — :latest and :${MAJOR_MINOR} not updated) |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`   | \`${RELEASE_VERSION}\` (pre-release) |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\` | \`${RELEASE_VERSION}\` (pre-release) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 4. Publish platform image (#2172) ──────────────────────────────────────
  #
  # Builds the platform image from devops/build/Dockerfile (the multi-stage
  # API + Worker + Web + Dapr CLI image whose local-clone build today produces
  # `localhost/spring-voyage:latest`) and pushes it to GHCR under the same
  # versioned/floating tagging scheme as the agent images.
  #
  # Same single-arch (linux/amd64) pattern as `publish-images`. Multi-arch
  # is a follow-up if/when operator demand surfaces; ship the same shape as
  # the existing release path for v0.1.
  #
  # The image is consumed by the installer (#2180) — it points spring.env's
  # SPRING_PLATFORM_IMAGE at this ref so deploy.sh up uses it instead of the
  # locally built `localhost/...` reference.
  publish-platform-image:
    name: Build and push platform image
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate]
    timeout-minutes: 45
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
      IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
      TARGET_BASE: ${{ env.SPRING_VOYAGE_PLATFORM_IMAGE }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify docker is on PATH
        shell: bash
        run: docker version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build platform image
        shell: bash
        run: |
          set -euo pipefail
          # Dockerfile expects the repo root as the build context — it COPYs
          # SpringVoyage.slnx, src/, platform/, packages/, dapr/, etc. Build
          # via `docker build -f` against the repo root, matching how
          # devops/build/build.sh does it locally with podman.
          docker build \
            -f devops/build/Dockerfile \
            -t "${TARGET_BASE}:${RELEASE_VERSION}" \
            .

      - name: Tag and push platform image
        shell: bash
        run: |
          set -euo pipefail
          # Immutable version tag — always pushed, stable and pre-release alike.
          docker push "${TARGET_BASE}:${RELEASE_VERSION}"
          echo "Pushed ${TARGET_BASE}:${RELEASE_VERSION}"

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:${MAJOR_MINOR}"
            docker push "${TARGET_BASE}:${MAJOR_MINOR}"
            echo "Pushed ${TARGET_BASE}:${MAJOR_MINOR}"

            docker tag "${TARGET_BASE}:${RELEASE_VERSION}" \
              "${TARGET_BASE}:latest"
            docker push "${TARGET_BASE}:latest"
            echo "Pushed ${TARGET_BASE}:latest"
          else
            echo "Pre-release: skipping :${MAJOR_MINOR} and :latest tags for spring-voyage platform image"
          fi

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api -X PATCH "/orgs/cvoya-com/packages/container/spring-voyage" \
            -F visibility=public

      - name: Platform image publish summary
        shell: bash
        run: |
          {
            echo "### Platform image published"
            echo
            echo "| Image | Tags |"
            echo "| --- | --- |"
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "| \`${TARGET_BASE}\` | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
            else
              echo "| \`${TARGET_BASE}\` | \`${RELEASE_VERSION}\` (pre-release — :latest and :${MAJOR_MINOR} not updated) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 5. Publish `spring` CLI binaries (#2172) ───────────────────────────────
  #
  # Publishes the operator-facing `spring` CLI as self-contained single-file
  # binaries across the same 5-RID matrix used by publish-dispatcher (linux-x64,
  # linux-arm64, osx-x64, osx-arm64, win-x64). Asset names follow the
  # `spring-<v>-<rid>.{tar.gz|zip}` convention so the source-free installer
  # (#2180) can resolve them deterministically off the GitHub Release.
  #
  # The compiled binary's default name is `Cvoya.Spring.Cli` (matching the
  # csproj). The installer symlinks `~/.local/bin/spring`, so we rename the
  # binary to `spring` inside the staged archive — this lets operators run
  # `spring` directly off the tarball without an installer indirection.
  publish-spring-cli:
    name: Publish spring CLI ${{ matrix.rid }}
    needs: [resolve, ci-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
            executable: spring
            source_executable: Cvoya.Spring.Cli
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar.gz
            executable: spring
            source_executable: Cvoya.Spring.Cli
          - rid: osx-x64
            os: macos-latest
            archive: tar.gz
            executable: spring
            source_executable: Cvoya.Spring.Cli
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz
            executable: spring
            source_executable: Cvoya.Spring.Cli
          - rid: win-x64
            os: windows-latest
            archive: zip
            executable: spring.exe
            source_executable: Cvoya.Spring.Cli.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      VERSION_LABEL: ${{ needs.resolve.outputs.version }}
      RID: ${{ matrix.rid }}
      ARCHIVE: ${{ matrix.archive }}
      EXECUTABLE: ${{ matrix.executable }}
      SOURCE_EXECUTABLE: ${{ matrix.source_executable }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json
            NuGet.config

      - name: Restore dependencies
        shell: bash
        run: dotnet restore src/Cvoya.Spring.Cli/Cvoya.Spring.Cli.csproj -r "${RID}"

      - name: Publish self-contained
        shell: bash
        run: |
          dotnet publish src/Cvoya.Spring.Cli/Cvoya.Spring.Cli.csproj \
            -c Release \
            -r "${RID}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -p:Version="${VERSION_LABEL}" \
            -p:InformationalVersion="${VERSION_LABEL}" \
            --no-restore \
            -o "publish/${RID}"

      - name: Verify the executable boots
        # Cross-RID emulation is not enabled, so only smoke the binary on
        # matching hosts. linux-arm64 / win-x64 archives are validated only
        # at unpack-time by the installer end-to-end test.
        if: matrix.rid == 'linux-x64' || matrix.rid == 'osx-x64' || matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          out="$("./publish/${RID}/${SOURCE_EXECUTABLE}" --help 2>&1 | head -1)"
          echo "spring --help (first line): ${out}"
          if [[ -z "${out}" ]]; then
            echo "::error::spring --help produced no output"
            exit 1
          fi

      - name: Package artifact
        id: package
        shell: bash
        run: |
          stage_dir="stage/${RID}"
          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"
          cp -R "publish/${RID}/." "${stage_dir}/"
          # Rename to the operator-facing binary name. The installer (#2180)
          # symlinks ~/.local/bin/spring -> this binary, but renaming here
          # means even operators who unpack the tarball manually can run
          # `./spring --help` directly.
          mv "${stage_dir}/${SOURCE_EXECUTABLE}" "${stage_dir}/${EXECUTABLE}"
          cat >"${stage_dir}/README.txt" <<EOF
          spring ${VERSION_LABEL} (${RID})

          Run the Spring Voyage CLI against an existing platform deployment:

              ./${EXECUTABLE} --help
              SPRING_API_URL=https://your.host ./${EXECUTABLE} agent list

          See https://github.com/cvoya-com/spring-voyage/blob/main/docs/guide/user/cli.md.
          EOF

          archive_name="spring-${VERSION_LABEL}-${RID}.${ARCHIVE}"
          if [[ "${ARCHIVE}" == "tar.gz" ]]; then
            tar -C "${stage_dir}" -czf "${archive_name}" .
          else
            ( cd "${stage_dir}" && 7z a "../../${archive_name}" . >/dev/null )
          fi
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"
          ls -lh "${archive_name}"

      - name: Upload archive to workflow artifacts
        uses: actions/upload-artifact@v7
        env:
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        with:
          # publish-bundle's SHA256SUMS step downloads via this prefix.
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach archive to the GitHub release
        uses: softprops/action-gh-release@v3
        env:
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ env.ARCHIVE_NAME }}
          fail_on_unmatched_files: true
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}

  # ── 6. Publish dispatcher binaries (#2172) ─────────────────────────────────
  #
  # Absorbed from .github/workflows/release-spring-dispatcher.yml (which was
  # deleted in this PR). The trigger changes from a dedicated `dispatcher-v*`
  # tag to the unified `v*.*.*` platform release tag — one release surface for
  # the image, bundle, CLI, and dispatcher (see #2172 and the plan in
  # docs/plan/v0.1/).
  #
  # Same 5-RID self-contained matrix as before. Asset names unchanged
  # (`spring-dispatcher-<v>-<rid>.{tar.gz|zip}`); the version label is now
  # the platform release version instead of the dispatcher-specific tag's
  # suffix.
  publish-dispatcher:
    name: Publish dispatcher ${{ matrix.rid }}
    needs: [resolve, ci-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
            executable: Cvoya.Spring.Dispatcher
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar.gz
            executable: Cvoya.Spring.Dispatcher
          - rid: osx-x64
            os: macos-latest
            archive: tar.gz
            executable: Cvoya.Spring.Dispatcher
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz
            executable: Cvoya.Spring.Dispatcher
          - rid: win-x64
            os: windows-latest
            archive: zip
            executable: Cvoya.Spring.Dispatcher.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      VERSION_LABEL: ${{ needs.resolve.outputs.version }}
      RID: ${{ matrix.rid }}
      ARCHIVE: ${{ matrix.archive }}
      EXECUTABLE: ${{ matrix.executable }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json
            NuGet.config

      - name: Restore dependencies
        shell: bash
        run: dotnet restore src/Cvoya.Spring.Dispatcher/Cvoya.Spring.Dispatcher.csproj -r "${RID}"

      - name: Publish self-contained
        shell: bash
        run: |
          dotnet publish src/Cvoya.Spring.Dispatcher/Cvoya.Spring.Dispatcher.csproj \
            -c Release \
            -r "${RID}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -p:Version="${VERSION_LABEL}" \
            -p:InformationalVersion="${VERSION_LABEL}" \
            --no-restore \
            -o "publish/${RID}"

      - name: Verify the executable boots and reports its version
        if: matrix.rid == 'linux-x64' || matrix.rid == 'osx-x64' || matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          out="$("./publish/${RID}/${EXECUTABLE}" --version)"
          echo "version output: ${out}"
          if [[ "${out}" != "${VERSION_LABEL}"* ]]; then
            echo "::error::--version output '${out}' does not start with the published version '${VERSION_LABEL}'"
            exit 1
          fi

      - name: Package artifact
        id: package
        shell: bash
        run: |
          stage_dir="stage/${RID}"
          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"
          cp -R "publish/${RID}/." "${stage_dir}/"
          cat >"${stage_dir}/README.txt" <<EOF
          spring-dispatcher ${VERSION_LABEL} (${RID})

          Run as a long-lived host process via devops/deploy/spring-voyage-host.sh:

              SPRING_DISPATCHER_BIN="\$PWD/${EXECUTABLE}" \\
                ./spring-voyage-host.sh start

          See https://github.com/cvoya-com/spring-voyage/blob/main/devops/deploy/README.md.
          EOF

          archive_name="spring-dispatcher-${VERSION_LABEL}-${RID}.${ARCHIVE}"
          if [[ "${ARCHIVE}" == "tar.gz" ]]; then
            tar -C "${stage_dir}" -czf "${archive_name}" .
          else
            ( cd "${stage_dir}" && 7z a "../../${archive_name}" . >/dev/null )
          fi
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"
          ls -lh "${archive_name}"

      - name: Upload archive to workflow artifacts
        uses: actions/upload-artifact@v7
        env:
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        with:
          # publish-bundle's SHA256SUMS step downloads via this prefix.
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach archive to the GitHub release
        uses: softprops/action-gh-release@v3
        env:
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ env.ARCHIVE_NAME }}
          fail_on_unmatched_files: true
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}

  # ── 7. Publish deployment bundle + SHA256SUMS (#2172) ──────────────────────
  #
  # Assembles the operator-facing deployment bundle and a SHA256SUMS file
  # covering every release asset. Runs last among the publish-* jobs so it
  # can download the dispatcher and CLI archives from the workflow's own
  # artifact store and checksum them in one pass.
  #
  # Bundle contents (extracted by the installer under
  # ~/.spring-voyage/releases/<v>/bundle/):
  #   deploy.sh, setup.sh, spring-voyage-host.sh, relay.sh           — from devops/deploy/
  #   Caddyfile, Caddyfile.multi-host, docker-compose.yml             — from devops/deploy/
  #   spring.env.example                                              — from devops/deploy/
  #   scripts/dispatcher-smoke.sh, scripts/test-spring-voyage-host.sh — from devops/deploy/scripts/
  #   dapr/components/delegated-spring-voyage-agent/...               — from repo root (required:
  #                                                                     setup.sh writes
  #                                                                     Dapr__Sidecar__DelegatedSpringVoyageAgentComponentsPath
  #                                                                     pointing at this tree)
  #   manifest.json                                                   — generated here
  #   README.md                                                       — generated here
  #   LICENSE                                                         — from repo root LICENSE.md
  # Also included (added in #2180):
  #   uninstall.sh                                                    — from devops/install/
  #                                                                     (ships in-bundle so
  #                                                                     `voyage uninstall`
  #                                                                     survives install-root cleanup)
  # Explicitly NOT included:
  #   - devops/build/ — source-build artifacts; operators with the bundle don't build images locally
  #
  # SHA256SUMS covers: bundle tarball + 5 dispatcher archives + 5 CLI
  # archives. Platform image is intentionally excluded (it's a registry
  # artifact with its own GHCR digest, not a release-attached download).
  publish-bundle:
    name: Publish deployment bundle and SHA256SUMS
    runs-on: ubuntu-latest
    needs:
      - resolve
      - ci-gate
      - publish-platform-image
      - publish-spring-cli
      - publish-dispatcher
    timeout-minutes: 20
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      PLATFORM_IMAGE_REPO: ${{ env.SPRING_VOYAGE_PLATFORM_IMAGE }}

    steps:
      - uses: actions/checkout@v6

      - name: Assemble bundle staging tree
        id: bundle
        shell: bash
        run: |
          set -euo pipefail

          stage="stage/bundle"
          rm -rf stage
          mkdir -p "${stage}/scripts"

          # devops/deploy/ — operator scripts and config.
          cp devops/deploy/deploy.sh              "${stage}/"
          cp devops/deploy/setup.sh               "${stage}/"
          cp devops/deploy/spring-voyage-host.sh  "${stage}/"
          cp devops/deploy/relay.sh               "${stage}/"
          cp devops/deploy/Caddyfile              "${stage}/"
          cp devops/deploy/Caddyfile.multi-host   "${stage}/"
          cp devops/deploy/docker-compose.yml     "${stage}/"
          cp devops/deploy/spring.env.example     "${stage}/"
          cp devops/deploy/scripts/dispatcher-smoke.sh        "${stage}/scripts/"
          cp devops/deploy/scripts/test-spring-voyage-host.sh "${stage}/scripts/"

          # devops/install/uninstall.sh — ships in the bundle so
          # `voyage uninstall` keeps working after the install
          # root's `current` symlink is torn down (#2180, ADR-0042).
          cp devops/install/uninstall.sh          "${stage}/"
          chmod +x "${stage}/uninstall.sh"

          # devops/install/voyage — operator wrapper, installed
          # by install.sh as ${BIN_DIR}/voyage. Ships in the
          # bundle so install.sh has a known checked-in source and a
          # re-install (`voyage install`) can refresh it (#2173).
          cp devops/install/voyage                "${stage}/"
          chmod +x "${stage}/voyage"

          # dapr/components/delegated-spring-voyage-agent/ — REQUIRED. setup.sh
          # writes Dapr__Sidecar__DelegatedSpringVoyageAgentComponentsPath
          # pointing at this tree, so a source-free install can't function
          # without it.
          mkdir -p "${stage}/dapr/components"
          cp -R dapr/components/delegated-spring-voyage-agent \
            "${stage}/dapr/components/"

          # LICENSE — repo-root LICENSE.md, renamed to the conventional bundle name.
          cp LICENSE.md "${stage}/LICENSE"

          # manifest.json — pinned version + image refs the installer reads to
          # resolve which platform image to pull and which dispatcher/CLI
          # asset filenames to download.
          cat >"${stage}/manifest.json" <<EOF
          {
            "bundle_schema_version": 1,
            "version": "${RELEASE_VERSION}",
            "platform_image": "${PLATFORM_IMAGE_REPO}:${RELEASE_VERSION}",
            "dispatcher_version": "${RELEASE_VERSION}",
            "cli_version": "${RELEASE_VERSION}"
          }
          EOF

          # README.md — short, operator-facing pointer. The full operator
          # narrative lives at docs/guide/operator/deployment.md in the
          # main repo; the installer (#2180) prints a final summary that
          # references it. Keep this short on purpose — operators consume
          # docs/ for the deep narrative, not a duplicated README in the
          # bundle.
          cat >"${stage}/README.md" <<EOF
          # Spring Voyage deployment bundle

          Version: ${RELEASE_VERSION}
          Platform image: ${PLATFORM_IMAGE_REPO}:${RELEASE_VERSION}

          This bundle ships the operator-facing slice of the Spring Voyage
          repository: deployment scripts, runtime configuration, and the
          Dapr component manifests required by a source-free install. It
          is consumed by the source-free installer (see
          https://github.com/cvoya-com/spring-voyage/issues/2158); a
          contributor with a clone of the repo does not need this tarball.

          ## Layout

          \`\`\`
          deploy.sh                         Container lifecycle (\`deploy.sh up|down|status\`)
          setup.sh                          One-shot spring.env bootstrap helper
          spring-voyage-host.sh             Dispatcher host-process wrapper
          relay.sh                          Caddy relay helper
          Caddyfile, Caddyfile.multi-host   Caddy reverse-proxy configuration
          docker-compose.yml                Docker-compatible runtime (Podman is the supported path)
          spring.env.example                Template for the per-deployment spring.env
          scripts/                          Smoke tests for the dispatcher and host wrapper
          dapr/components/                  Dapr component manifests consumed by the platform sidecar
          manifest.json                     Version pinning (image, dispatcher, CLI)
          uninstall.sh                      Bundle-side uninstall (invoked by \`voyage uninstall\`)
          voyage                            Operator wrapper (status / logs / restart / version / install / uninstall)
          \`\`\`

          ## Operator entry point

          For a fresh install on a Podman host, follow the installer flow
          (#2180). Operators who prefer to drive the bundle by hand:

          \`\`\`bash
          # 1. Generate spring.env from spring.env.example (edit hostnames,
          #    secrets, AES key, image refs as documented inline).
          cp spring.env.example spring.env
          \$EDITOR spring.env

          # 2. Start the stack.
          SPRING_ENV_FILE=\$PWD/spring.env ./deploy.sh up
          \`\`\`

          See https://github.com/cvoya-com/spring-voyage/blob/main/docs/guide/operator/deployment.md
          for the canonical operator narrative, secret-handling guidance,
          and the spring.env reference.
          EOF

          archive_name="spring-voyage-${RELEASE_VERSION}-bundle.tar.gz"
          tar -C stage -czf "${archive_name}" bundle
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"
          ls -lh "${archive_name}"
          echo "--- bundle contents ---"
          tar -tzf "${archive_name}" | sort

      - name: Upload bundle to workflow artifacts
        uses: actions/upload-artifact@v7
        env:
          ARCHIVE_NAME: ${{ steps.bundle.outputs.archive_name }}
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach bundle to the GitHub release
        uses: softprops/action-gh-release@v3
        env:
          ARCHIVE_NAME: ${{ steps.bundle.outputs.archive_name }}
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: ${{ env.ARCHIVE_NAME }}
          fail_on_unmatched_files: true
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}

      - name: Download dispatcher and CLI archives from workflow artifacts
        uses: actions/download-artifact@v8
        with:
          # actions/download-artifact@v8 with no `name` downloads every
          # artifact uploaded by this workflow run. The SHA256SUMS step
          # explicitly enumerates the file names it expects below, so a
          # stray artifact would just be ignored.
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        id: sums
        shell: bash
        run: |
          set -euo pipefail

          # Stage every release-attached asset in one flat directory so
          # `sha256sum <file>` produces filename-only lines (the canonical
          # `sha256sum -c` consumable format).
          sums_stage="sums-stage"
          rm -rf "${sums_stage}"
          mkdir -p "${sums_stage}"

          bundle_name="${{ steps.bundle.outputs.archive_name }}"
          cp "${bundle_name}" "${sums_stage}/"

          # Dispatcher: spring-dispatcher-<v>-<rid>.{tar.gz|zip}
          dispatcher_prefix="spring-dispatcher-${RELEASE_VERSION}-"
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            name="${dispatcher_prefix}${rid}.tar.gz"
            src="artifacts/${name}"
            [[ -f "${src}" ]] || { echo "::error::missing dispatcher artifact ${src}"; exit 1; }
            cp "${src}" "${sums_stage}/"
          done
          win_name="${dispatcher_prefix}win-x64.zip"
          src="artifacts/${win_name}"
          [[ -f "${src}" ]] || { echo "::error::missing dispatcher artifact ${src}"; exit 1; }
          cp "${src}" "${sums_stage}/"

          # CLI: spring-<v>-<rid>.{tar.gz|zip}
          cli_prefix="spring-${RELEASE_VERSION}-"
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            name="${cli_prefix}${rid}.tar.gz"
            src="artifacts/${name}"
            [[ -f "${src}" ]] || { echo "::error::missing CLI artifact ${src}"; exit 1; }
            cp "${src}" "${sums_stage}/"
          done
          win_name="${cli_prefix}win-x64.zip"
          src="artifacts/${win_name}"
          [[ -f "${src}" ]] || { echo "::error::missing CLI artifact ${src}"; exit 1; }
          cp "${src}" "${sums_stage}/"

          # `sha256sum *` against the staging dir produces lines like
          # `<hex>  spring-voyage-<v>-bundle.tar.gz` — exactly what
          # `sha256sum -c SHA256SUMS` expects when the operator unpacks
          # the assets into one directory.
          ( cd "${sums_stage}" && sha256sum -- * | sort ) > SHA256SUMS

          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Attach SHA256SUMS to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: SHA256SUMS
          fail_on_unmatched_files: true
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}

      - name: Bundle publish summary
        shell: bash
        run: |
          {
            echo "### Deployment bundle and checksums published"
            echo
            echo "| Asset | Notes |"
            echo "| --- | --- |"
            echo "| \`${{ steps.bundle.outputs.archive_name }}\` | Operator deployment bundle (devops/deploy/ slice + dapr/components/delegated-spring-voyage-agent/ + manifest.json) |"
            echo "| \`SHA256SUMS\` | Covers bundle + 5 dispatcher archives + 5 CLI archives |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 8. GitHub Release ──────────────────────────────────────────────────────
  #
  # Creates the GitHub Release using the ## [Unreleased] section of
  # CHANGELOG.md as the release notes. The maintainer's pre-release PR
  # moves the [Unreleased] entries to the new version heading before tagging;
  # this job reads whatever is in [Unreleased] at the tagged commit.
  #
  # Uses `gh` directly (GITHUB_TOKEN) rather than softprops/action-gh-release
  # so there is no external action dependency beyond the already-used actions/*.
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate, publish-images, publish-platform-image, publish-spring-cli, publish-dispatcher, publish-bundle]
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          notes="$(bash scripts/extract-changelog-section.sh "Unreleased")"
          if [[ -z "$notes" ]]; then
            echo "::warning::## [Unreleased] section in CHANGELOG.md is empty — release notes will be empty."
          fi
          # Write to a temp file so multiline content survives the GITHUB_OUTPUT
          # 256 KB limit and avoids any quoting pitfalls.
          echo "$notes" > /tmp/release-notes.md

      - name: Append release-asset reference table
        shell: bash
        env:
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
        run: |
          set -euo pipefail
          # The release notes are sourced from CHANGELOG.md [Unreleased]. As
          # of #2172, every v*.*.* tag publishes a uniform set of asset
          # classes (platform image, spring CLI, dispatcher, deployment
          # bundle, SHA256SUMS) — append a reference table so operators
          # browsing the GitHub Release page don't have to cross-reference
          # docs/developer/releases.md.
          {
            echo
            echo "---"
            echo
            echo "## Release assets"
            echo
            echo "### Container images (GHCR)"
            echo
            echo "| Image | Tags |"
            echo "| --- | --- |"
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "| \`ghcr.io/cvoya-com/spring-voyage\` (platform) | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/claude-code-base\`        | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`              | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\`     | \`${RELEASE_VERSION}\`, \`${MAJOR_MINOR}\`, \`latest\` |"
            else
              echo "| \`ghcr.io/cvoya-com/spring-voyage\` (platform) | \`${RELEASE_VERSION}\` (pre-release — :latest and :${MAJOR_MINOR} not updated) |"
              echo "| \`ghcr.io/cvoya-com/claude-code-base\`        | \`${RELEASE_VERSION}\` (pre-release) |"
              echo "| \`ghcr.io/cvoya-com/agent-base\`              | \`${RELEASE_VERSION}\` (pre-release) |"
              echo "| \`ghcr.io/cvoya-com/spring-voyage-agent\`     | \`${RELEASE_VERSION}\` (pre-release) |"
            fi
            echo
            echo "### Release-attached files"
            echo
            echo "| Asset | Description |"
            echo "| --- | --- |"
            echo "| \`spring-voyage-${RELEASE_VERSION}-bundle.tar.gz\` | Deployment bundle (operator scripts, Caddy config, Dapr components, \`manifest.json\`). |"
            echo "| \`spring-${RELEASE_VERSION}-{linux-x64,linux-arm64,osx-x64,osx-arm64,win-x64}.{tar.gz,zip}\` | Self-contained \`spring\` CLI binaries (5 RIDs). |"
            echo "| \`spring-dispatcher-${RELEASE_VERSION}-{linux-x64,linux-arm64,osx-x64,osx-arm64,win-x64}.{tar.gz,zip}\` | Self-contained dispatcher host binaries (5 RIDs). |"
            echo "| \`SHA256SUMS\` | sha256sum-compatible checksums for every release-attached file above. |"
          } >> /tmp/release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          # The asset-publishing jobs (#2172: publish-dispatcher, publish-spring-cli,
          # publish-bundle) use softprops/action-gh-release, which auto-creates the
          # release on first attach. If the release already exists by the time this
          # job runs, `gh release create` would fail — switch to `gh release edit` to
          # refresh the title and notes-file. Idempotent either way.
          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release edit "${RELEASE_TAG}" \
              --title "v${RELEASE_VERSION}" \
              --notes-file /tmp/release-notes.md \
              --repo "${REPO}" \
              ${prerelease_flag}
            echo "GitHub Release updated: https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
          else
            # shellcheck disable=SC2086
            gh release create "${RELEASE_TAG}" \
              --title "v${RELEASE_VERSION}" \
              --notes-file /tmp/release-notes.md \
              --repo "${REPO}" \
              ${prerelease_flag}
            echo "GitHub Release created: https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
          fi
