# CI pipeline for Spring Voyage (.NET / Dapr).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore SpringVoyage.slnx

      - name: Build
        run: dotnet build SpringVoyage.slnx --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Dapr CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash -s 1.14.1
          dapr --version

      - name: Initialize Dapr
        run: dapr init --slim

      - name: Restore dependencies
        run: dotnet restore SpringVoyage.slnx

      - name: Test
        run: dotnet test --solution SpringVoyage.slnx --no-restore

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore SpringVoyage.slnx

      - name: Check formatting
        run: dotnet format SpringVoyage.slnx --no-restore --verify-no-changes

  agent-definitions-lint:
    name: Lint agent definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent definition references
        run: |
          for def_file in $(find packages -path "*/agents/*.md" -not -name ".gitkeep" 2>/dev/null); do
            echo "Checking $def_file ..."

            grep -oE '(skills|workflows|connectors|execution|units)_dir:\s*\S+' "$def_file" 2>/dev/null | while IFS=: read -r _ ref_path; do
              ref_path=$(echo "$ref_path" | xargs)
              base_dir=$(dirname "$def_file")
              resolved="$base_dir/$ref_path"
              if [ ! -e "$resolved" ]; then
                echo "::error file=$def_file::Referenced path '$ref_path' does not exist (resolved to '$resolved')"
                touch /tmp/agent_lint_failed
              fi
            done
          done

          for def_file in $(find packages -path "*/agents/*.yaml" -o -path "*/agents/*.yml" 2>/dev/null); do
            echo "Checking $def_file ..."

            grep -oE 'path:\s*\S+' "$def_file" 2>/dev/null | while IFS=: read -r _ ref_path; do
              ref_path=$(echo "$ref_path" | xargs)
              if [[ "$ref_path" != /* ]]; then
                base_dir=$(dirname "$def_file")
                resolved="$base_dir/$ref_path"
              else
                resolved="$ref_path"
              fi
              if [ ! -e "$resolved" ]; then
                echo "::error file=$def_file::Referenced path '$ref_path' does not exist (resolved to '$resolved')"
                touch /tmp/agent_lint_failed
              fi
            done
          done

          if [ -f /tmp/agent_lint_failed ]; then
            echo ""
            echo "Agent definition lint failed: some referenced paths do not exist."
            exit 1
          fi

          echo "All agent definition references are valid (or no definitions found yet)."
