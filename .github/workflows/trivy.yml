name: Trivy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '23 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false

    - name: Scan dependencies, secrets, and configuration
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        version: v0.70.0
        scan-type: fs
        scan-ref: .
        scanners: vuln,secret,misconfig
        severity: HIGH,CRITICAL
        exit-code: 1
        ignore-unfixed: true
        skip-dirs: v0.1,**/node_modules,.git,artifacts,**/bin,**/obj,**/.next,**/coverage,**/TestResults
