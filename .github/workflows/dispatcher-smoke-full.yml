name: Dispatcher smoke (Tier 2 — full deploy.sh round-trip)

# Tier-2 smoke is too expensive for every PR (it spins up the whole
# data-plane via eng/deploy/deploy.sh — Postgres, Redis, NATS, the
# worker container — so each run takes 5-10 minutes on a hosted
# runner and pulls a few hundred MB of images). It exists so the
# pre-release gate exercises the same path the operator runs locally
# with `./deploy.sh up`. The Tier-1 smoke in ci.yml covers the
# dispatcher round-trip on every PR.
#
# Triggered manually before tagging a release:
#   gh workflow run dispatcher-smoke-full.yml
#
# Or on the dispatcher release tag itself, gated on the matching
# release workflow having succeeded.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test against (default: HEAD of the workflow's branch)."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: dispatcher-smoke-full
  cancel-in-progress: false

jobs:
  full-roundtrip:
    name: Full deploy.sh + dispatcher round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json
            NuGet.config

      - name: Verify required tooling is on PATH
        shell: bash
        run: |
          for binary in podman curl python3; do
            if ! command -v "${binary}" >/dev/null 2>&1; then
              echo "::error::required tool '${binary}' is not on PATH"
              exit 1
            fi
          done

      # deploy.sh runs as the non-root `runner` user (rootless Podman). Caddy
      # publishes 80/443, but a default GitHub-hosted runner keeps the kernel's
      # unprivileged-port floor at 1024, so deploy.sh's preflight_up fails fast
      # ("rootless Podman cannot bind Caddy host ports 80/443"). Lower the floor
      # to 80 up front — this is exactly option A from deploy.sh's own guidance
      # and lets the Tier-2 smoke exercise the real privileged-port bring-up an
      # operator runs, rather than a non-default high-port config. See #2926.
      - name: Allow rootless binds to 80/443
        shell: bash
        run: |
          echo 'net.ipv4.ip_unprivileged_port_start=80' | sudo tee /etc/sysctl.d/99-spring-voyage.conf
          sudo sysctl --system

      - name: Bring the stack up via deploy.sh
        shell: bash
        run: |
          cd eng/deploy
          ./deploy.sh up

      - name: Verify deploy.sh published dispatcher from HEAD
        shell: bash
        run: |
          set -euo pipefail
          expected_sha="$(git rev-parse HEAD)"
          dispatcher_status="$(eng/deploy/spring-voyage-host.sh status 2>&1)"
          dispatcher_version="$(sed -n 's/.*version:[[:space:]]*//p' <<<"${dispatcher_status}" | tail -n1)"
          if [[ "${dispatcher_version}" != *"${expected_sha}"* ]]; then
            echo "::error::dispatcher version '${dispatcher_version}' does not include HEAD ${expected_sha}"
            echo "${dispatcher_status}"
            exit 1
          fi
          echo "dispatcher version matches HEAD: ${dispatcher_version}"

      - name: Run dispatcher smoke against the running stack
        shell: bash
        run: bash eng/deploy/scripts/dispatcher-smoke.sh

      - name: Capture stack logs on failure
        if: failure()
        shell: bash
        run: |
          cd eng/deploy
          ./deploy.sh logs > deploy-logs.txt 2>&1 || true

      - name: Upload stack logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        env:
          RUN_ID: ${{ github.run_id }}
        with:
          name: deploy-logs-${{ env.RUN_ID }}
          path: |
            eng/deploy/deploy-logs.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear the stack down
        if: always()
        shell: bash
        run: |
          cd eng/deploy
          ./deploy.sh down || true
