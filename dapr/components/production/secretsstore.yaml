# Production secrets-backing state store — PostgreSQL.
#
# Backs the OSS application-layer secret store
# (`DaprStateBackedSecretStore`) under a key namespace that is shared
# across every Spring Voyage host (API, worker, dispatcher). The default
# `statestore` component uses Dapr's standard `keyPrefix: appid`, which
# silently scopes every key by the calling sidecar's `--app-id` — so a
# secret written by `spring-api` lands at `spring-api||secrets/{key}` and
# is invisible to `spring-worker` reading the same logical key (#2212).
#
# This dedicated component pins `keyPrefix: none`, so the key is stored
# verbatim and every host resolves the same secret through the same
# row. The actor/state store cannot adopt the same setting because
# Dapr's actor runtime relies on the per-app prefix to partition actor
# state. Hence the split: `statestore` for actors and other
# `DaprStateStore` consumers, `secretsstore` for the cross-host secret
# store.
#
# The connection string is pulled from the paired `secretstore`
# component (secretstores.local.env) via `secretKeyRef`, so the Postgres
# password never lands in the image or in git. Provide it as the
# `SPRING_POSTGRES_CONNECTION_STRING` environment variable on the Dapr
# sidecar container (wired via `devops/deploy/spring.env`).
#
# Host `spring-postgres` resolves over the `spring-net` Podman bridge.
apiVersion: dapr.io/v1alpha1
kind: Component
auth:
  secretStore: secretstore
metadata:
  name: secretsstore
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      secretKeyRef:
        name: SPRING_POSTGRES_CONNECTION_STRING
        key: SPRING_POSTGRES_CONNECTION_STRING
    # Qualify Dapr's tables explicitly. Same rationale as `statestore` —
    # under the deployment's `spring` user the default search_path can
    # drift between `public.state` and `spring.state` after migrations.
    - name: tableName
      value: "public.state"
    - name: metadataTableName
      value: "public.dapr_metadata"
    # Cross-host shared key namespace. See header comment.
    - name: keyPrefix
      value: "none"
