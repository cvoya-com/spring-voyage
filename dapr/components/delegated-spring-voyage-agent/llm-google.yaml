# Dapr Conversation -> Google AI (Gemini) API. The Spring Voyage launcher
# pins this component by name via SPRING_LLM_COMPONENT=llm-google whenever a
# unit's ai.model.provider is `google`.
#
# Credential injection mirrors the Anthropic component: the launcher sets
# GOOGLE_API_KEY on the agent app, ContainerLifecycleManager propagates it
# into the daprd sidecar's env, and secretstores.local.env satisfies the
# secretKeyRef below.
#
# Naming follows ADR-0038: in-tree Dapr component files use the
# `llm-{provider.id}` convention. The Dapr `type:` field stays
# `conversation.googleai` because that is Dapr's contract, not ours.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llm-google
spec:
  type: conversation.googleai
  version: v1
  metadata:
    - name: key
      secretKeyRef:
        name: GOOGLE_API_KEY
        key: GOOGLE_API_KEY
auth:
  secretStore: secretstore
