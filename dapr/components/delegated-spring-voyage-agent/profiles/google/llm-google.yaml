# Per-provider components profile for `provider: google` units.
# Mounted into the per-dispatch daprd sidecar at /components — only this
# profile's components are loaded so a deployment that lacks the other
# providers' API keys does not fatal daprd on boot.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llm-google
spec:
  type: conversation.googleai
  version: v1
  metadata:
    - name: key
      secretKeyRef:
        name: GOOGLE_API_KEY
        key: GOOGLE_API_KEY
auth:
  secretStore: secretstore
