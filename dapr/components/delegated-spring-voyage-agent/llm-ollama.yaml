# Dapr Conversation -> Ollama (OpenAI-compatible). The Python agent's
# DaprChatClient is wired to this component name via SPRING_LLM_COMPONENT.
#
# Notes on metadata values:
#   * Dapr does NOT do POSIX-style `${VAR:-default}` substitution in
#     component YAML — daprd treats the literal string as the value
#     and the conversation call then fails at the OpenAI URL parser.
#   * `model` lives on the Conversation component (dapr-agents 1.x
#     dropped the per-call model kwarg from `DaprChatClient`). The
#     platform propagates SPRING_MODEL into daprd's process env and
#     secretstores.local.env resolves it here at sidecar startup, so each
#     unit/agent can request its own model without deployment-time rewrites.
#
# Naming follows ADR-0038: in-tree Dapr component files use the
# `llm-{provider.id}` convention. The Dapr `type:` field stays
# `conversation.openai` because Ollama exposes an OpenAI-compatible
# surface and that is Dapr's contract, not ours.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llm-ollama
spec:
  type: conversation.openai
  version: v1
  metadata:
  - name: key
    value: "ollama"
  - name: model
    secretKeyRef:
      name: SPRING_MODEL
      key: SPRING_MODEL
  - name: endpoint
    value: "http://spring-ollama:11434/v1"
auth:
  secretStore: secretstore
