# Spring Voyage runtime catalogue — ADR-0038.
#
# This file is the single source of truth for the agent runtimes and
# model providers the platform supports. Per ADR-0038 decisions 2 and 3,
# adding a runtime, a provider, or a (runtime, provider, authMethod)
# edge is a config edit (and a launcher / adapter strategy addition only
# when behaviour is genuinely novel).
#
# A JSON schema for this file lives next door at
# `runtime-catalog.schema.json`. CI lints the YAML against the schema so
# typos in closed-enum fields fail at PR review rather than at startup.

modelProviders:
  - id: anthropic
    displayName: Anthropic
    apiBaseUrl: https://api.anthropic.com
    modelsEndpoint: /v1/models
    adapter: anthropic
    authMethods: [oauth, api-key]
    llmApiContract:
      name: anthropic
      version: v1
    defaultModels:
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

  - id: openai
    displayName: OpenAI
    apiBaseUrl: https://api.openai.com
    modelsEndpoint: /v1/models
    adapter: openai-compatible
    authMethods: [api-key]
    llmApiContract:
      name: openai
      version: v1
    defaultModels:
      - gpt-4o
      - gpt-4o-mini
      - o4-mini

  - id: google
    displayName: Google
    apiBaseUrl: https://generativelanguage.googleapis.com
    modelsEndpoint: /v1/models
    adapter: google
    authMethods: [api-key]
    llmApiContract:
      name: google
      version: v1
    defaultModels:
      - gemini-2.0-flash
      - gemini-1.5-pro
      - gemini-1.5-flash

  - id: ollama
    displayName: Ollama
    apiBaseUrl: http://localhost:11434
    modelsEndpoint: /api/tags
    adapter: openai-compatible
    authMethods: []
    llmApiContract:
      name: openai
      version: v1
    defaultModels:
      - qwen3.6:27b
      - qwen3.6:27b-coding-nvfp4
      - deepseek-r1:7b
      - deepseek-coder:6.7b

agentRuntimes:
  - id: claude-code
    displayName: Claude Code
    defaultImage: ghcr.io/cvoya-com/spring-voyage-claude-code-base:latest
    launcher: claude-code-cli
    threadBinding:
      kind: cli-arg
      argName: --resume
    modelProviders:
      - id: anthropic
        authMethod: oauth
        credentialEnvVar: CLAUDE_CODE_OAUTH_TOKEN

  - id: codex
    displayName: Codex
    defaultImage: ghcr.io/cvoya-com/spring-voyage-codex-base:latest
    launcher: codex-cli
    threadBinding:
      kind: cli-arg
      argName: --conversation-id
    modelProviders:
      - id: openai
        authMethod: api-key
        credentialEnvVar: OPENAI_API_KEY

  - id: gemini
    displayName: Gemini CLI
    defaultImage: ghcr.io/cvoya-com/spring-voyage-gemini-base:latest
    launcher: gemini-cli
    threadBinding:
      kind: cli-arg
      argName: --session-id
    modelProviders:
      - id: google
        authMethod: api-key
        credentialEnvVar: GOOGLE_API_KEY

  - id: spring-voyage
    displayName: Spring Voyage Agent
    defaultImage: ghcr.io/cvoya-com/spring-voyage-agent:latest
    launcher: spring-voyage-agent
    threadBinding:
      kind: env-var
      envVarName: SPRING_THREAD_ID
    modelProviders:
      - id: anthropic
        authMethod: api-key
        credentialEnvVar: ANTHROPIC_API_KEY
      - id: openai
        authMethod: api-key
        credentialEnvVar: OPENAI_API_KEY
      - id: google
        authMethod: api-key
        credentialEnvVar: GOOGLE_API_KEY
      - id: ollama

  # Generic always-on engine runtime (ADR-0066). An image-agnostic,
  # persistent A2A-process host for an external orchestration engine
  # (LangGraph, and any other engine that ships a conforming A2A image).
  # The launcher is image-agnostic; the defaultImage below is the
  # platform-built LangGraph orchestrator used by the magazine-langgraph
  # package. Other engines ship their own image and reuse this runtime.
  - id: a2a-process
    displayName: A2A Process (orchestration engine)
    defaultImage: ghcr.io/cvoya-com/spring-voyage-langgraph-orchestrator:latest
    launcher: a2a-process
    threadBinding:
      kind: env-var
      envVarName: SPRING_THREAD_ID
    modelProviders:
      - id: anthropic
        authMethod: api-key
        credentialEnvVar: ANTHROPIC_API_KEY
      - id: openai
        authMethod: api-key
        credentialEnvVar: OPENAI_API_KEY
