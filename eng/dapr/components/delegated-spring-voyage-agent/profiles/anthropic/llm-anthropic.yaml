# Per-provider components profile for `provider: anthropic` units.
# Mounted into the per-dispatch daprd sidecar at /components — only this
# profile's components are loaded so a deployment that lacks the other
# providers' API keys does not fatal daprd on boot.
#
# The credential is resolved by ILlmCredentialResolver and injected into
# the agent app's container as ANTHROPIC_API_KEY. ContainerLifecycleManager
# propagates it into the daprd sidecar's process env so secretstore (local
# env) can satisfy this `secretKeyRef`.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llm-anthropic
spec:
  type: conversation.anthropic
  version: v1
  metadata:
    - name: key
      secretKeyRef:
        name: ANTHROPIC_API_KEY
        key: ANTHROPIC_API_KEY
auth:
  secretStore: secretstore
