# Local secret store for the per-launch daprd sidecar. Reads secrets from
# the sidecar container's process environment (NOT the agent app's env) —
# ContainerLifecycleManager.BuildDaprSidecarConfig (#1714 step 3) is what
# threads the resolved provider credentials into the sidecar's env so the
# Conversation YAMLs in this directory can satisfy their secretKeyRef
# entries.
#
# Required by every conversation-*.yaml in this directory whose `auth:
# { secretStore: secretstore }` references this component name.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.local.env
  version: v1
