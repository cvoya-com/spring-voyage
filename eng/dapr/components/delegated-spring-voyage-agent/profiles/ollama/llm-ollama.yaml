# Per-provider components profile for `provider: ollama` units.
# Mounted into the per-dispatch daprd sidecar at /components — only this
# profile's components are loaded so a deployment that lacks the other
# providers' API keys does not fatal daprd on boot.
#
# Naming follows ADR-0038: in-tree Dapr component files use the
# `llm-{provider.id}` convention. The Dapr `type:` field stays
# `conversation.openai` because Ollama exposes an OpenAI-compatible
# surface and that is Dapr's contract, not ours.
#
# `model` is resolved from SPRING_MODEL in the sidecar's local-env secret
# store. The worker propagates that env var from the selected unit/agent
# launch context so deployment does not need to know every model a unit may
# request.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llm-ollama
spec:
  type: conversation.openai
  version: v1
  metadata:
  - name: key
    value: "ollama"
  - name: model
    secretKeyRef:
      name: SPRING_MODEL
      key: SPRING_MODEL
  - name: endpoint
    value: "http://spring-ollama:11434/v1"
auth:
  secretStore: secretstore
