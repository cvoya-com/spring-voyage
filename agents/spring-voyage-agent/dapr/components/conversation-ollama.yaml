apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  # #1714 step 4: renamed from `llm-provider` to `conversation-ollama`,
  # mirroring the canonical platform path under
  # dapr/components/delegated-spring-voyage-agent/.
  name: conversation-ollama
spec:
  type: conversation.openai
  version: v1
  metadata:
  - name: key
    value: "ollama"
  - name: model
    value: "${SPRING_MODEL:-llama3.2:3b}"
  - name: endpoint
    value: "${SPRING_LLM_PROVIDER_URL:-http://spring-ollama:11434/v1}"
