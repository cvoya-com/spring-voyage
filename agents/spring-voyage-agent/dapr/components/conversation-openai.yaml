apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  # #1714 step 4: renamed from `llm-provider` to `conversation-openai`,
  # mirroring the canonical platform path under
  # dapr/components/delegated-spring-voyage-agent/.
  name: conversation-openai
spec:
  type: conversation.openai
  version: v1
  metadata:
  - name: key
    secretKeyRef:
      name: OPENAI_API_KEY
      key: OPENAI_API_KEY
  - name: model
    value: "${SPRING_MODEL:-gpt-4o}"
auth:
  secretStore: secretstore
