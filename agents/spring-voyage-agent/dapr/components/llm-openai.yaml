apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  # ADR-0038: in-tree Dapr component files follow the `llm-{provider.id}`
  # naming convention. Mirrors the canonical platform path under
  # dapr/components/delegated-spring-voyage-agent/.
  name: llm-openai
spec:
  type: conversation.openai
  version: v1
  metadata:
  - name: key
    secretKeyRef:
      name: OPENAI_API_KEY
      key: OPENAI_API_KEY
  - name: model
    value: "${SPRING_MODEL:-gpt-4o}"
auth:
  secretStore: secretstore
